<section class="contact-section">

<div class="contact-container">

<h2>Request Service</h2>
<p class="subtitle">Tell us what you need and we'll contact you shortly</p>

<form action="https://formsubmit.co/griffintechnologyservicesllc@gmail.com" method="POST">

<label>Full Name</label>
<input type="text" name="name" placeholder="John Smith" required>

<label>Email Address</label>
<input type="email" name="email" placeholder="john@email.com" required>

<label>Phone Number</label>
<input type="tel" name="phone" placeholder="(505) 555-5555" required>

<label>Select Service</label>
<select name="service" required>
<option value="">Choose a Service</option>
<option>Computer Repair</option>
<option>WiFi Setup</option>
<option>Virus Removal</option>
<option>New Computer Setup</option>
<option>Business IT Support</option>
<option>Network Setup</option>
<option>Printer Setup</option>
<option>Security Camera Installation</option>
</select>

<label>Urgency Level</label>
<select name="urgency">
<option value="">Select urgency</option>
<option>Same Day</option>
<option>Within 24 Hours</option>
<option>This Week</option>
<option>Flexible</option>
</select>

<label>Location</label>
<input type="text" name="location" placeholder="Los Lunas, NM">

<label>Description</label>
<textarea name="message" placeholder="Describe your issue..." rows="6"></textarea>

<button class="submit-btn" type="submit">Request Service</button>

<input type="hidden" name="_subject" value="New Service Request">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">
<input type="hidden" name="_autoresponse" value="Thank you for contacting Griffin Technology Services. We will contact you shortly.">

</form>

</div>

</section>
