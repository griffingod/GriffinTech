<form action="https://formsubmit.co/griffintechnologyservicesllc@gmail.com" method="POST">

<h3>Customer Information</h3>

<input type="text" name="name" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email Address" required>
<input type="tel" name="phone" placeholder="Phone Number" required>

<h3>Service Details</h3>

<select name="service" required>
<option value="">Select Service</option>
<option>Computer Repair</option>
<option>WiFi Setup</option>
<option>Virus Removal</option>
<option>New Computer Setup</option>
<option>Business IT Support</option>
<option>Network Setup</option>
<option>Printer Setup</option>
<option>Security Camera Installation</option>
</select>

<select name="urgency">
<option value="">Urgency Level</option>
<option>Same Day</option>
<option>Within 24 Hours</option>
<option>This Week</option>
<option>Flexible</option>
</select>

<input type="text" name="location" placeholder="City / Business Name">

<textarea name="message" placeholder="Describe the issue..." rows="5"></textarea>

<button class="button" type="submit">Request Service</button>

<input type="hidden" name="_subject" value="New Service Request">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">
<input type="hidden" name="_autoresponse" value="Thank you for contacting Griffin Technology Services. We will contact you shortly.">

</form>
